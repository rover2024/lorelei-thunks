# The interposed subset. Kept small and curated by hand (this is a partial libc thunk), not produced
# by the symbol autogen step the full-library thunks use.
[Function]
# Allocator family: the whole point is that malloc and free name the same heap on both sides of the
# boundary. The guest-side Entry of each is overridden in Manifest_guest.cpp (bootstrap + ownership
# tag); the generated Adapt -> Caller -> Exec underneath forwards to the host libc.
malloc
calloc
realloc
free
aligned_alloc
posix_memalign

# stdio FILE* family: so a guest FILE goes to the host libc and a host-side thunked library that
# takes it (e.g. BZ2_bzWriteOpen(FILE*)) sees a host FILE instead of tripping glibc's stdio vtable
# check. The guest's stdin/stdout/stderr are remapped to the host's in the Adapt layer by a single
# ProcArgFilter<FILE*> (Manifest_guest.cpp). The variadic ones (fprintf/vfprintf) are recognised as
# format functions by LibCFormat from their names; the FILE* filter applies to them in the Adapt
# layer like any other (this relies on the TypeFilter fix that takes argument names from the
# builder-reshaped Adapt signature).
#
# The *64 large-file variants (fopen64 / freopen64 / fseeko64 / ...) are listed alongside the plain
# names because programs built with _FILE_OFFSET_BITS=64 (e.g. bzip2) call those symbols instead; the
# CMakeLists passes -D_GNU_SOURCE so they are declared. Miss them and an un-interposed fopen64 hands
# back a guest FILE that aborts the moment a host library touches it.
#
# Excluded for now:
#  * getline / getdelim / asprintf: they return a buffer the host allocated with its own internal
#    malloc (no ownership tag), which the guest would then mis-free; they need separate handling.
#  * popen / fmemopen / open_memstream are out of scope too.
fopen
fopen64
fdopen
freopen
freopen64
fclose
tmpfile
tmpfile64
fread
fwrite
fseek
ftell
rewind
fseeko
fseeko64
ftello
ftello64
fgetpos
fgetpos64
fsetpos
fsetpos64
feof
ferror
clearerr
fileno
fflush
setvbuf
setbuf
fgetc
getc
fputc
putc
fgets
fputs
ungetc
getchar
putchar
puts
printf
fprintf
vprintf
vfprintf
perror
