# The public libbz2 API (bzlib.h). The FILE*-based entries (BZ2_bzReadOpen / BZ2_bzWriteOpen / ...)
# are exactly why this thunk needs the libc-shim stdio interposer: a guest FILE handed to the host
# libbz2 trips glibc's stdio vtable check, so the FILE must already be a host FILE (opened through the
# interposed fopen).
